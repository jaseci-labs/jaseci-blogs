name: Tests

# Unit tests for the editorial tooling (scripts/schedule_lib.py) and structural
# checks on the workflows themselves (YAML + inline github-script syntax).
# Runs on every PR so it can be marked a required check alongside "Lint new posts".

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run tests
        run: pytest -q
